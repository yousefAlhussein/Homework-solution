<main>
  <section class="py-5">
    <div class="container">
      <div class="row g-4 justify-content-center">

        <!-- CALCULATOR -->
        <div class="col-lg-5">
          <div class="calc-wrapper">
            <div class="calc-container">

              <!-- Display -->
              <div class="calc-display" id="calcDisplay">
                <div class="calc-expression" id="calcExpr"></div>
                <div class="calc-main" id="calcMain">0</div>
              </div>

              <!-- Buttons -->
              <div class="calc-grid">
                <button class="calc-btn btn-clear" onclick="calcAC()">AC</button>
                <button class="calc-btn btn-special" onclick="calcToggleSign()">+/-</button>
                <button class="calc-btn btn-special" onclick="calcPercent()">%</button>
                <button class="calc-btn btn-op" onclick="calcOp('÷')">÷</button>

                <button class="calc-btn btn-num" onclick="calcNum('7')">7</button>
                <button class="calc-btn btn-num" onclick="calcNum('8')">8</button>
                <button class="calc-btn btn-num" onclick="calcNum('9')">9</button>
                <button class="calc-btn btn-op" onclick="calcOp('×')">×</button>

                <button class="calc-btn btn-num" onclick="calcNum('4')">4</button>
                <button class="calc-btn btn-num" onclick="calcNum('5')">5</button>
                <button class="calc-btn btn-num" onclick="calcNum('6')">6</button>
                <button class="calc-btn btn-op" onclick="calcOp('−')">−</button>

                <button class="calc-btn btn-num" onclick="calcNum('1')">1</button>
                <button class="calc-btn btn-num" onclick="calcNum('2')">2</button>
                <button class="calc-btn btn-num" onclick="calcNum('3')">3</button>
                <button class="calc-btn btn-op btn-eq" onclick="calcEquals()" style="grid-row:span 2;aspect-ratio:unset;padding:12px 0">=</button>

                <button class="calc-btn btn-num btn-zero" onclick="calcNum('0')">0</button>
                <button class="calc-btn btn-num" onclick="calcDot()">.</button>

              </div>

              <div class="keyboard-hint mt-3">⌨️ يدعم لوحة المفاتيح</div>
            </div>
          </div>
        </div>

        <!-- HISTORY -->
        <div class="col-lg-4">
          <div class="history-panel">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 style="font-weight:800;color:var(--text-dark);margin:0">
                <i class="bi bi-clock-history me-2 text-primary"></i>سجل العمليات
              </h5>
              <button onclick="clearHistory()" style="background:none;border:none;color:var(--danger);font-size:0.82rem;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700">
                <i class="bi bi-trash3 me-1"></i>مسح
              </button>
            </div>
            <div id="historyList">
              <div style="text-align:center;padding:30px;color:var(--text-muted);font-size:0.88rem">
                <i class="bi bi-calculator" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.4"></i>
                لا توجد عمليات بعد
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
